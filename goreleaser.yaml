version: 2
project_name: vlab

builds:
  - id: vlab
    main: ./cmd/vlab
    binary: vlab
    # This injects the Git Tag into main.Version variable
    ldflags:
      - -X main.Version={{.Tag}}
    env: [CGO_ENABLED=0]
    goos: [darwin]
    goarch: [arm64]

archives:
  - id: default
    builds: [vlab]
    format: tar.gz
    name_template: "vlab_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"

